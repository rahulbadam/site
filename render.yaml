services:
  - type: web
    name: vivahbandhan-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build:shared && npm run build:api
    startCommand: npm run start --workspace=packages/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
